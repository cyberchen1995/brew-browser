# cargo-audit configuration.
#
# The advisories below are all RUSTSEC "unmaintained" warnings (NOT
# vulnerabilities) for transitive dependencies that only compile on the LINUX
# Tauri build — the GTK3 / glib bindings and a couple of build-time macro
# crates. They are never built on macOS, carry no known CVE, and are pulled in
# by Tauri/wry upstream (not direct deps we can bump). They're ignored here so
# `cargo audit` stays green and a *real* future advisory isn't lost in the
# unmaintained noise. Reviewed 2026-06-06 during the pre-release security pass.
#
# Re-evaluate when Tauri migrates off GTK3 (the gtk4 / webkitgtk-6 track).

[advisories]
ignore = [
    # gtk-rs GTK3 bindings — no longer maintained (Linux-only).
    "RUSTSEC-2024-0411", # gdkwayland-sys
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0414", # gdkx11-sys
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0417", # gdkx11
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    "RUSTSEC-2024-0420", # gtk-sys
    "RUSTSEC-2024-0429", # glib (unsoundness in unmaintained gtk-rs line)
    # Build-time / unicode helper crates, unmaintained, transitive.
    "RUSTSEC-2024-0370", # proc-macro-error
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident
]
